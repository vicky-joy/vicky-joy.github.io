<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Open lens hacker mark</title>
  <rect width="64" height="64" rx="14" fill="#050816"/>

  <!-- An open investigative lens: curiosity without a closed boundary. -->
  <path
    d="M37.8 43.1A18 18 0 1 1 42 18.7"
    stroke="#6FEBFF"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- The lens handle doubles as a decisive forward slash. -->
  <path
    d="m40.5 41.5 10 10"
    stroke="#9E8CFF"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- The broken edge escapes outward: freedom and an open mind. -->
  <path
    d="M39.5 23.5 49 14m0 0-1.2 8.2M49 14l-8.2 1.2"
    stroke="#EDF4FF"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- A compact terminal prompt at the center. -->
  <path
    d="m21.5 27 6 5-6 5M31.5 37H38"
    stroke="#EDF4FF"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
