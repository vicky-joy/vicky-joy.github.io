<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Straw hat hacker investigation mark</title>
  <rect width="64" height="64" rx="14" fill="#050816"/>

  <!-- The lens is intentionally 80% closed, leaving room for discovery. -->
  <circle cx="31" cy="36" r="17" fill="#0A1024"/>
  <circle
    cx="31"
    cy="36"
    r="17"
    pathLength="100"
    stroke="#6FEBFF"
    stroke-width="5"
    stroke-linecap="round"
    stroke-dasharray="80 20"
  />

  <!-- Magnifying-glass handle. -->
  <path
    d="m43.5 48.5 9 9"
    stroke="#9E8CFF"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Hacker terminal prompt inside the investigative lens. -->
  <path
    d="m22 33 5.5 4.5L22 42m9.5 0H39"
    stroke="#7CFF9B"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- A freedom-inspired straw hat with its characteristic red band. -->
  <path
    d="M20 23c.6-7 2.1-12.3 5-15.5 3.9 1.5 8.3 1.5 12.2 0 2.8 3.4 4.3 8.7 4.8 15.5Z"
    fill="#F4C95D"
    stroke="#C58A2A"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <path d="M21.2 17.5h19.6l.8 5.5H20.4Z" fill="#D94343"/>
  <path
    d="M9.5 22c5.8 1.8 14.4 2.8 21.5 2.8S46.7 23.8 52.5 22c-2.7 6.7-12.4 10-21.5 10S12.2 28.7 9.5 22Z"
    fill="#F4C95D"
    stroke="#C58A2A"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <path
    d="M14.5 24.5c5.5 2.2 11 3 16.5 3s11-.8 16.5-3"
    stroke="#FFE58A"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg>
