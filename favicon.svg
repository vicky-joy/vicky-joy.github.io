<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Straw hat hacker magnifying-glass emblem</title>
  <defs>
    <linearGradient id="bg" x1="8" y1="3" x2="56" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15213D"/>
      <stop offset=".5" stop-color="#080D20"/>
      <stop offset="1" stop-color="#03050E"/>
    </linearGradient>
    <radialGradient id="glass" cx="0" cy="0" r="1" gradientTransform="translate(26 33) rotate(55) scale(29)">
      <stop stop-color="#174064" stop-opacity=".96"/>
      <stop offset=".55" stop-color="#0A1B35" stop-opacity=".98"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="rim" x1="16" y1="29" x2="51" y2="57" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8FAFF"/>
      <stop offset=".32" stop-color="#42DDF2"/>
      <stop offset=".68" stop-color="#708EFF"/>
      <stop offset="1" stop-color="#A873FF"/>
    </linearGradient>
    <linearGradient id="handle" x1="44" y1="50" x2="60" y2="63" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6DE7F7"/>
      <stop offset=".5" stop-color="#7E89FF"/>
      <stop offset="1" stop-color="#A66BFF"/>
    </linearGradient>
    <linearGradient id="straw" x1="24" y1="5" x2="40" y2="27" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0A3"/>
      <stop offset=".42" stop-color="#F8D268"/>
      <stop offset="1" stop-color="#DFA334"/>
    </linearGradient>
    <linearGradient id="brim" x1="10" y1="22" x2="51" y2="31" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE994"/>
      <stop offset=".48" stop-color="#F5CB58"/>
      <stop offset="1" stop-color="#D99B2B"/>
    </linearGradient>
    <linearGradient id="band" x1="19" y1="17" x2="45" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F65A4F"/>
      <stop offset=".55" stop-color="#DF3540"/>
      <stop offset="1" stop-color="#AF1D32"/>
    </linearGradient>
    <filter id="hatShadow" x="-25%" y="-30%" width="150%" height="175%">
      <feDropShadow dx="0" dy="1.8" stdDeviation="1.4" flood-color="#02040C" flood-opacity=".78"/>
    </filter>
    <filter id="terminalGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" stroke="#C7F9FF" stroke-opacity=".14"/>

  <!-- The glass ends beneath the brim; no circular stroke exists behind the hat. -->
  <path d="M17 29A18 18 0 1 0 47 29Z" fill="url(#glass)"/>
  <path d="M17 29A18 18 0 1 0 47 29" stroke="#020611" stroke-width="8" stroke-linecap="round"/>
  <path d="M17 29A18 18 0 1 0 47 29" stroke="url(#rim)" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M20.5 45.5c4.4 8.1 14.7 10.6 22.1 5.4" stroke="#A6F6FF" stroke-opacity=".22" stroke-width="1.4" stroke-linecap="round"/>

  <!-- A distinct magnifying-glass handle, locked into the lower-right rim. -->
  <path d="m44.7 51 11.7 11.5" stroke="#020611" stroke-width="9" stroke-linecap="round"/>
  <path d="m44.7 51 11.7 11.5" stroke="url(#handle)" stroke-width="5.5" stroke-linecap="round"/>
  <path d="m47 52.8 8.6 8.4" stroke="#E8E2FF" stroke-opacity=".32" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Terminal prompt remains visually centered in the exposed glass. -->
  <g filter="url(#terminalGlow)" stroke="#82FFAD" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="m23 35.5 5.5 4.8-5.5 4.8"/>
    <path d="M32.5 45H40"/>
  </g>

  <!-- Low rounded crown, red sash, and broad shallow brim inspired by Luffy's straw hat. -->
  <g filter="url(#hatShadow)">
    <path
      d="M16.8 24C18.1 13.9 22.9 7 32 7s13.9 6.9 15.2 17Z"
      fill="url(#straw)"
      stroke="#B9781F"
      stroke-width="1.4"
      stroke-linejoin="round"
    />
    <path d="M18.2 17.3c8.9 1 18.7 1 27.6 0l1 6.9H17.2Z" fill="url(#band)"/>
    <path d="M18.5 17.6c8.6 1 18.4 1 27 0" stroke="#FF8771" stroke-opacity=".55" stroke-width="1"/>

    <path
      d="M5.5 24c8.2-3.4 44.8-3.4 53 0-7.8 6.7-45.2 6.7-53 0Z"
      fill="url(#brim)"
      stroke="#B9781F"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
    <path d="M10.5 24.2c8.6 3.8 34.4 3.8 43 0" stroke="#FFF3B0" stroke-width="1.45" stroke-linecap="round"/>
    <path d="M16.5 28.1c9.3 2.2 21.7 2.2 31 0" stroke="#C98724" stroke-opacity=".55" stroke-width=".9" stroke-linecap="round"/>
    <path d="M23.5 9.6c5.3-2.1 11.7-2.1 17 0" stroke="#FFF4B5" stroke-opacity=".56" stroke-width="1.1" stroke-linecap="round"/>
  </g>
</svg>
